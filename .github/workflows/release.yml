name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.0.1)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: musl build
    runs-on: ubuntu-latest
    container: clux/muslrust:stable
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - id: meta
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
      - run: cargo build --release --bin n8n-rustful-operator
      - uses: actions/upload-artifact@v7
        with:
          name: musl-binary
          path: target/x86_64-unknown-linux-musl/release/n8n-rustful-operator
          if-no-files-found: error

  docker:
    name: ghcr.io image
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: musl-binary
          path: .
      - run: chmod +x ./n8n-rustful-operator
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: tags
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}},value=${{ github.event.inputs.tag || github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.inputs.tag || github.ref_name }}
            type=raw,value=latest
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.tags.outputs.labels }}

  release:
    name: github release
    runs-on: ubuntu-latest
    needs: [build, docker]
    steps:
      - uses: actions/checkout@v6
      - name: stage manifests with pinned image tag
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          version="${tag#v}"
          mkdir -p dist
          cp yaml/crd.yaml dist/crd.yaml
          cp yaml/instance-sample.yaml dist/instance-sample.yaml
          sed "s|__IMAGE_TAG__|${version}|g" yaml/install.yaml > dist/install.yaml
          cat dist/crd.yaml > "dist/n8n-rustful-operator-${version}.yaml"
          echo "---" >> "dist/n8n-rustful-operator-${version}.yaml"
          cat dist/install.yaml >> "dist/n8n-rustful-operator-${version}.yaml"
          sha256sum dist/*.yaml > dist/SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          body: |
            Container image: `ghcr.io/${{ github.repository }}:${{ needs.build.outputs.version }}`

            Install:
            ```sh
            kubectl apply -f https://github.com/${{ github.repository }}/releases/download/${{ github.event.inputs.tag || github.ref_name }}/n8n-rustful-operator-${{ needs.build.outputs.version }}.yaml
            ```
          files: |
            dist/crd.yaml
            dist/install.yaml
            dist/instance-sample.yaml
            dist/n8n-rustful-operator-*.yaml
            dist/SHA256SUMS
