name: Tag and release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Force a tag (e.g. v0.0.1). Leave empty to auto-bump from conventional commits."
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  cut_release:
    name: Bump version, tag and publish GitHub Release
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag || steps.manual.outputs.tag }}
      new_version: ${{ steps.bump.outputs.new_version || steps.manual.outputs.version }}
    steps:
      - name: Mint a GitHub App installation token
        # Required so the tag and release events fan out into downstream
        # workflows — GITHUB_TOKEN-triggered events do not.
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Check out source (full history for tag-action)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Compute next semver tag from conventional commits
        id: bump
        if: github.event.inputs.tag == ''
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          default_bump: false
          release_branches: main
          tag_prefix: v

      - name: Use manually supplied tag
        id: manual
        if: github.event.inputs.tag != ''
        run: |
          tag="${{ github.event.inputs.tag }}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Short-circuit if there is nothing to release
        id: gate
        run: |
          tag="${{ steps.bump.outputs.new_tag || steps.manual.outputs.tag }}"
          if [ -z "$tag" ]; then
            echo "no conventional-commit bump and no manual tag; nothing to release"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install stable toolchain
        if: steps.gate.outputs.skip != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cargo cache
        if: steps.gate.outputs.skip != 'true'
        uses: Swatinem/rust-cache@v2

      - name: Re-render CRD yaml from source
        if: steps.gate.outputs.skip != 'true'
        run: cargo run --bin crdgen > yaml/crd.yaml

      - name: Stage install manifests with the new image tag pinned
        if: steps.gate.outputs.skip != 'true'
        run: |
          version="${{ steps.bump.outputs.new_version || steps.manual.outputs.version }}"
          mkdir -p dist
          cp yaml/crd.yaml dist/crd.yaml
          cp yaml/single-sample.yaml dist/single-sample.yaml
          sed "s|__IMAGE_TAG__|${version}|g" yaml/install.yaml > dist/install.yaml
          cat dist/crd.yaml > "dist/n8n-rustful-operator-${version}.yaml"
          echo "---" >> "dist/n8n-rustful-operator-${version}.yaml"
          cat dist/install.yaml >> "dist/n8n-rustful-operator-${version}.yaml"
          sha256sum dist/*.yaml > dist/SHA256SUMS

      - name: Publish GitHub Release with manifests
        if: steps.gate.outputs.skip != 'true'
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          tag_name: ${{ steps.bump.outputs.new_tag || steps.manual.outputs.tag }}
          name: ${{ steps.bump.outputs.new_tag || steps.manual.outputs.tag }}
          body: |
            Container image: `${{ env.IMAGE }}:${{ steps.bump.outputs.new_version || steps.manual.outputs.version }}`
            (built by the "Publish container image" workflow that runs right after this release.)

            Install:
            ```sh
            kubectl apply -f https://github.com/${{ github.repository }}/releases/download/${{ steps.bump.outputs.new_tag || steps.manual.outputs.tag }}/n8n-rustful-operator-${{ steps.bump.outputs.new_version || steps.manual.outputs.version }}.yaml
            ```

            ## Changelog
            ${{ steps.bump.outputs.changelog }}
          files: |
            dist/crd.yaml
            dist/install.yaml
            dist/single-sample.yaml
            dist/n8n-rustful-operator-*.yaml
            dist/SHA256SUMS
