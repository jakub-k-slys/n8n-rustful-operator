name: release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Force a tag (e.g. v0.0.1). Leave empty to auto-bump from conventional commits."
        required: false
        type: string

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  tag:
    name: compute tag
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag || github.event.inputs.tag }}
      new_version: ${{ steps.bump.outputs.new_version || steps.manual.outputs.version }}
      changelog: ${{ steps.bump.outputs.changelog }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: bump
        if: github.event.inputs.tag == ''
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: false
          release_branches: main
          tag_prefix: v
      - id: manual
        if: github.event.inputs.tag != ''
        run: |
          tag="${{ github.event.inputs.tag }}"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

  build:
    name: musl build
    needs: tag
    if: needs.tag.outputs.new_tag != ''
    runs-on: ubuntu-latest
    container: clux/muslrust:stable
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --bin n8n-rustful-operator
      - uses: actions/upload-artifact@v7
        with:
          name: musl-binary
          path: target/x86_64-unknown-linux-musl/release/n8n-rustful-operator
          if-no-files-found: error

  docker:
    name: ghcr.io image
    needs: [tag, build]
    if: needs.tag.outputs.new_tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: musl-binary
          path: .
      - run: chmod +x ./n8n-rustful-operator
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: tags
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.tag.outputs.new_tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.tag.outputs.new_tag }}
            type=raw,value=latest
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.tags.outputs.labels }}

  release:
    name: github release
    needs: [tag, build, docker]
    if: needs.tag.outputs.new_tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.tag.outputs.new_tag }}
      - name: stage manifests with pinned image tag
        run: |
          version="${{ needs.tag.outputs.new_version }}"
          mkdir -p dist
          cp yaml/crd.yaml dist/crd.yaml
          cp yaml/instance-sample.yaml dist/instance-sample.yaml
          sed "s|__IMAGE_TAG__|${version}|g" yaml/install.yaml > dist/install.yaml
          cat dist/crd.yaml > "dist/n8n-rustful-operator-${version}.yaml"
          echo "---" >> "dist/n8n-rustful-operator-${version}.yaml"
          cat dist/install.yaml >> "dist/n8n-rustful-operator-${version}.yaml"
          sha256sum dist/*.yaml > dist/SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          name: ${{ needs.tag.outputs.new_tag }}
          body: |
            Container image: `${{ env.IMAGE }}:${{ needs.tag.outputs.new_version }}`

            Install:
            ```sh
            kubectl apply -f https://github.com/${{ github.repository }}/releases/download/${{ needs.tag.outputs.new_tag }}/n8n-rustful-operator-${{ needs.tag.outputs.new_version }}.yaml
            ```

            ## Changelog
            ${{ needs.tag.outputs.changelog }}
          files: |
            dist/crd.yaml
            dist/install.yaml
            dist/instance-sample.yaml
            dist/n8n-rustful-operator-*.yaml
            dist/SHA256SUMS
