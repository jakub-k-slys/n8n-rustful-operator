name: release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Force a tag (e.g. v0.0.1). Leave empty to auto-bump from conventional commits."
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  release:
    name: tag + github release
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag || steps.manual.outputs.tag }}
      new_version: ${{ steps.bump.outputs.new_version || steps.manual.outputs.version }}
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - id: bump
        if: github.event.inputs.tag == ''
        uses: mathieudutour/github-tag-action@v6.2
        with:
          # App token so the pushed tag triggers downstream workflows
          # (a tag pushed by GITHUB_TOKEN is silently ignored by GHA).
          github_token: ${{ steps.app-token.outputs.token }}
          default_bump: false
          release_branches: main
          tag_prefix: v

      - id: manual
        if: github.event.inputs.tag != ''
        run: |
          tag="${{ github.event.inputs.tag }}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: stop if no new tag
        id: gate
        run: |
          tag="${{ steps.bump.outputs.new_tag || steps.manual.outputs.tag }}"
          if [ -z "$tag" ]; then
            echo "no conventional-commit bump and no manual tag; nothing to release"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: dtolnay/rust-toolchain@stable
        if: steps.gate.outputs.skip != 'true'

      - uses: Swatinem/rust-cache@v2
        if: steps.gate.outputs.skip != 'true'

      - name: regenerate CRD
        if: steps.gate.outputs.skip != 'true'
        run: cargo run --bin crdgen > yaml/crd.yaml

      - name: stage manifests with pinned image tag
        if: steps.gate.outputs.skip != 'true'
        run: |
          version="${{ steps.bump.outputs.new_version || steps.manual.outputs.version }}"
          mkdir -p dist
          cp yaml/crd.yaml dist/crd.yaml
          cp yaml/instance-sample.yaml dist/instance-sample.yaml
          sed "s|__IMAGE_TAG__|${version}|g" yaml/install.yaml > dist/install.yaml
          cat dist/crd.yaml > "dist/n8n-rustful-operator-${version}.yaml"
          echo "---" >> "dist/n8n-rustful-operator-${version}.yaml"
          cat dist/install.yaml >> "dist/n8n-rustful-operator-${version}.yaml"
          sha256sum dist/*.yaml > dist/SHA256SUMS

      - uses: softprops/action-gh-release@v2
        if: steps.gate.outputs.skip != 'true'
        with:
          # App token so the `release: published` event triggers docker.yml.
          token: ${{ steps.app-token.outputs.token }}
          tag_name: ${{ steps.bump.outputs.new_tag || steps.manual.outputs.tag }}
          name: ${{ steps.bump.outputs.new_tag || steps.manual.outputs.tag }}
          body: |
            Container image: `${{ env.IMAGE }}:${{ steps.bump.outputs.new_version || steps.manual.outputs.version }}`
            (built by the docker workflow that runs right after this release.)

            Install:
            ```sh
            kubectl apply -f https://github.com/${{ github.repository }}/releases/download/${{ steps.bump.outputs.new_tag || steps.manual.outputs.tag }}/n8n-rustful-operator-${{ steps.bump.outputs.new_version || steps.manual.outputs.version }}.yaml
            ```

            ## Changelog
            ${{ steps.bump.outputs.changelog }}
          files: |
            dist/crd.yaml
            dist/install.yaml
            dist/instance-sample.yaml
            dist/n8n-rustful-operator-*.yaml
            dist/SHA256SUMS
