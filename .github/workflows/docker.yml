name: Publish container image

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

env:
  CARGO_TERM_COLOR: always
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build_and_push:
    name: Build musl binary and push to ghcr.io
    runs-on: ubuntu-latest
    steps:
      - name: Check out source at the release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Derive image tag and version from release tag
        id: tag
        run: |
          tag="${{ github.event.release.tag_name }}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Install stable toolchain with musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install musl C toolchain
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build statically-linked operator binary
        run: cargo build --release --target x86_64-unknown-linux-musl --bin n8n-rustful-operator

      - name: Stage binary next to the Dockerfile
        run: cp target/x86_64-unknown-linux-musl/release/n8n-rustful-operator .

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags (X.Y.Z, X.Y, latest)
        uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.tag.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.tag.outputs.tag }}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
