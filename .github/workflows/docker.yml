name: docker

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

env:
  CARGO_TERM_COLOR: always
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    name: build + push ghcr image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: derive version from release tag
        id: tag
        run: |
          tag="${{ github.event.release.tag_name }}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2

      - name: install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: musl build
        run: cargo build --release --target x86_64-unknown-linux-musl --bin n8n-rustful-operator

      - name: stage binary for Dockerfile
        run: cp target/x86_64-unknown-linux-musl/release/n8n-rustful-operator .

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.tag.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.tag.outputs.tag }}
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
