name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  fmt:
    name: rustfmt (nightly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo +nightly fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --all-features --verbose
      - run: cargo test --all-features --verbose

  crd-up-to-date:
    name: crd up-to-date
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: regenerate yaml/crd.yaml
        run: cargo run --bin crdgen > yaml/crd.yaml
      - name: fail if regeneration produced a diff
        run: git diff --exit-code -- yaml/crd.yaml

  semver-check:
    name: cargo semver-checks
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check semver
        uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          baseline-rev: ${{ github.event.pull_request.base.sha }}

  regenerate-yaml:
    name: regenerate yaml on main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: regenerate yaml/crd.yaml
        run: cargo run --bin crdgen > yaml/crd.yaml
      - name: commit if changed
        run: |
          if ! git diff --quiet -- yaml/crd.yaml; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add yaml/crd.yaml
            git commit -m "chore: regenerate yaml/crd.yaml [skip ci]"
            git push
          fi

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  musl-build:
    name: musl build
    runs-on: ubuntu-latest
    container: clux/muslrust:stable
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --bin n8n-rustful-operator
      - uses: actions/upload-artifact@v7
        with:
          name: n8n-rustful-operator-musl
          path: target/x86_64-unknown-linux-musl/release/n8n-rustful-operator
          if-no-files-found: error

  docker:
    name: docker build
    runs-on: ubuntu-latest
    needs: [musl-build]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: n8n-rustful-operator-musl
          path: .
      - run: chmod +x ./n8n-rustful-operator
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: n8n-rustful-operator:ci
