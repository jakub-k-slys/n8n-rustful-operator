name: Pull request checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  rustfmt:
    name: Format (rustfmt)
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7
      - name: Install stable toolchain with rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Verify formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Lint (clippy)
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7
      - name: Install stable toolchain with clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
      - name: Run clippy (warnings = failure)
        run: cargo clippy --all-targets --all-features -- -D warnings

  unit_tests:
    name: Build and unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
      - name: Compile crate
        run: cargo build --all-features --verbose
      - name: Run cargo test (unit only; cucumber BDD runs in e2e.yml)
        run: cargo test --all-features --lib --bins --verbose

  crd_drift:
    name: CRD yaml drift check
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
      - name: Re-render yaml/crd.yaml from source
        run: cargo run --bin crdgen > yaml/crd.yaml
      - name: Fail if checked-in CRD is stale
        run: git diff --exit-code -- yaml/crd.yaml

  semver_checks:
    name: Public API semver
    runs-on: ubuntu-latest
    # Needs a PR base to diff against; skip on direct pushes to main.
    if: github.event_name == 'pull_request'
    steps:
      - name: Check out source (full history)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Diff public API against PR base
        uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          baseline-rev: ${{ github.event.pull_request.base.sha }}

  audit:
    name: Dependency security audit
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7
      - name: Run cargo audit
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
