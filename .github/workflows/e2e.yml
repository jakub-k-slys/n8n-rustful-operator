name: End-to-end BDD tests

on:
  # workflow_run fires for every "Publish container image" completion,
  # including ones triggered by GITHUB_TOKEN, unlike registry_package
  # which is unreliable.
  workflow_run:
    workflows: [Publish container image]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to test (e.g. v0.0.5)."
        required: true
        type: string

permissions:
  contents: read
  packages: read

env:
  IMAGE: ghcr.io/${{ github.repository }}
  TEST_INSTANCE_IMAGE: nginx:alpine

jobs:
  bdd_in_kind:
    name: Run BDD scenarios against a kind-loaded image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Check out source (main) for the latest BDD assertions
        uses: actions/checkout@v7

      - name: Resolve image tag for this run
        id: tag
        env:
          MANUAL: ${{ github.event.inputs.tag }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          if [ -n "$MANUAL" ]; then
            tag="$MANUAL"
          else
            git fetch --tags --quiet origin
            tag=$(git tag --points-at "$HEAD_SHA" | grep '^v' | sort -V | tail -1 || true)
            if [ -z "$tag" ]; then
              echo "no release tag at $HEAD_SHA — nothing to test"; exit 1
            fi
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull operator image freshly published to ghcr.io
        run: docker pull "${{ env.IMAGE }}:${{ steps.tag.outputs.version }}"

      - name: Spin up an ephemeral kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: n8n-e2e
          wait: 120s

      - name: Side-load image into the kind cluster
        run: kind load docker-image "${{ env.IMAGE }}:${{ steps.tag.outputs.version }}" --name n8n-e2e

      - name: Install Gateway API CRDs (standard channel)
        run: |
          kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.5.1/standard-install.yaml

      - name: Apply operator CRDs to the cluster
        run: kubectl apply -f yaml/crd.yaml

      - name: Install operator (pinned tag, imagePullPolicy=Never)
        run: |
          sed -e "s|__IMAGE_TAG__|${{ steps.tag.outputs.version }}|g" \
              -e "s|imagePullPolicy: IfNotPresent|imagePullPolicy: Never|g" \
              yaml/install.yaml | kubectl apply -f -
          kubectl -n n8n-operator rollout status deployment/n8n-rustful-operator --timeout=120s

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Execute cucumber-rs BDD suite
        id: bdd
        run: |
          set +e
          cargo test --test cucumber --release 2>&1 | tee /tmp/bdd.log
          status="${PIPESTATUS[0]}"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Render per-scenario summary into the run page
        if: always()
        run: |
          {
            echo "## BDD scenario results"
            echo ""
            echo "Image tested: \`${IMAGE}:${{ steps.tag.outputs.version }}\`"
            echo ""
            echo "| Status | Feature | Scenario |"
            echo "| --- | --- | --- |"
            awk '
              /^Feature:/ {
                sub(/^Feature:[[:space:]]*/, "")
                feature = $0
                next
              }
              /^[[:space:]]+Scenario:/ {
                if (scen != "") {
                  printf "| %s | %s | %s |\n", (failed ? "❌" : "✅"), prev_feature, scen
                }
                line = $0
                sub(/^[[:space:]]+Scenario:[[:space:]]*/, "", line)
                scen = line
                prev_feature = feature
                failed = 0
                next
              }
              /✘/ { failed = 1 }
              END {
                if (scen != "") {
                  printf "| %s | %s | %s |\n", (failed ? "❌" : "✅"), prev_feature, scen
                }
              }
            ' /tmp/bdd.log
            echo ""
            totals=$(grep -E "^[0-9]+ scenarios" /tmp/bdd.log | tail -1 || true)
            steps_=$(grep -E "^[0-9]+ steps"     /tmp/bdd.log | tail -1 || true)
            if [ -n "$totals" ]; then echo "**Scenarios:** $totals"; fi
            if [ -n "$steps_"  ]; then echo "**Steps:** $steps_"; fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dump operator logs and recent events on failure
        if: failure() || steps.bdd.outputs.status != '0'
        run: |
          kubectl -n n8n-operator logs deployment/n8n-rustful-operator --tail=200 || true
          kubectl get events -A --sort-by=.lastTimestamp | tail -50 || true

      - name: Re-raise BDD failure
        if: always()
        run: exit ${{ steps.bdd.outputs.status }}
