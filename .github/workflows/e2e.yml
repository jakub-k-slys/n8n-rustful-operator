name: e2e

on:
  # workflow_run fires for every docker workflow completion, including ones
  # triggered by GITHUB_TOKEN — unlike registry_package which is unreliable.
  workflow_run:
    workflows: [docker]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to test (e.g. v0.0.5)."
        required: true
        type: string

permissions:
  contents: read
  packages: read

env:
  IMAGE: ghcr.io/${{ github.repository }}
  TEST_INSTANCE_IMAGE: nginx:alpine

jobs:
  smoke:
    name: kind smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v6
        # Check out main (latest BDD assertions, exercising the released image).

      - name: resolve image tag
        id: tag
        env:
          MANUAL: ${{ github.event.inputs.tag }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          if [ -n "$MANUAL" ]; then
            tag="$MANUAL"
          else
            git fetch --tags --quiet origin
            tag=$(git tag --points-at "$HEAD_SHA" | grep '^v' | sort -V | tail -1 || true)
            if [ -z "$tag" ]; then
              echo "no release tag at $HEAD_SHA — nothing to test"; exit 1
            fi
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: pull ghcr image
        run: docker pull "${{ env.IMAGE }}:${{ steps.tag.outputs.version }}"

      - name: create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: n8n-e2e
          wait: 120s

      - name: load image into kind
        run: kind load docker-image "${{ env.IMAGE }}:${{ steps.tag.outputs.version }}" --name n8n-e2e

      - name: install CRD
        run: kubectl apply -f yaml/crd.yaml

      - name: install operator (pinned to tested tag, imagePullPolicy Never)
        run: |
          sed -e "s|__IMAGE_TAG__|${{ steps.tag.outputs.version }}|g" \
              -e "s|imagePullPolicy: IfNotPresent|imagePullPolicy: Never|g" \
              yaml/install.yaml | kubectl apply -f -
          kubectl -n n8n-operator rollout status deployment/n8n-rustful-operator --timeout=120s

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: run cucumber BDD suite
        run: cargo test --test cucumber --release

      - name: dump operator logs on failure
        if: failure()
        run: |
          kubectl -n n8n-operator logs deployment/n8n-rustful-operator --tail=200 || true
          kubectl get events -A --sort-by=.lastTimestamp | tail -50 || true
