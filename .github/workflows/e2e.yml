name: e2e

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  IMAGE: n8n-rustful-operator:e2e
  # Lightweight stand-in for n8nio/n8n in the smoke test — we are testing the
  # operator's reconcile loop (Deployment+Service creation, status), not n8n itself.
  TEST_INSTANCE_IMAGE: nginx:alpine

jobs:
  e2e:
    name: kind smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2

      - name: install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: regenerate CRD from source
        run: cargo run --bin crdgen > yaml/crd.yaml

      - name: musl build (operator binary)
        run: cargo build --release --target x86_64-unknown-linux-musl --bin n8n-rustful-operator

      - name: stage binary for Dockerfile
        run: cp target/x86_64-unknown-linux-musl/release/n8n-rustful-operator .

      - uses: docker/setup-buildx-action@v4

      - name: build operator image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE }}

      - name: create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: n8n-e2e
          wait: 120s

      - name: load operator image into kind
        run: kind load docker-image "${{ env.IMAGE }}" --name n8n-e2e

      - name: install CRD
        run: kubectl apply -f yaml/crd.yaml

      - name: install operator
        run: |
          sed -e "s|ghcr.io/jakub-k-slys/n8n-rustful-operator:__IMAGE_TAG__|${{ env.IMAGE }}|g" \
              -e "s|imagePullPolicy: IfNotPresent|imagePullPolicy: Never|g" \
              yaml/install.yaml | kubectl apply -f -
          kubectl -n n8n-operator rollout status deployment/n8n-rustful-operator --timeout=120s

      - name: apply Instance
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: n8n.slys.dev/v1
          kind: Instance
          metadata:
            name: e2e
            namespace: default
          spec:
            image: ${{ env.TEST_INSTANCE_IMAGE }}
            replicas: 1
            host: e2e.example.com
          EOF

      - name: wait for child Deployment to be created and ready
        run: |
          # Operator should create a Deployment named after the Instance.
          for i in {1..30}; do
            if kubectl -n default get deployment/e2e >/dev/null 2>&1; then break; fi
            echo "waiting for deployment/e2e ($i)…"; sleep 2
          done
          kubectl -n default get deployment/e2e
          kubectl -n default rollout status deployment/e2e --timeout=180s

      - name: assert child Service exists on port 5678
        run: |
          kubectl -n default get svc/e2e -o jsonpath='{.spec.ports[0].port}' | grep -q '^5678$'

      - name: assert Instance status was patched
        run: |
          for i in {1..15}; do
            ready=$(kubectl -n default get instance/e2e -o jsonpath='{.status.ready}' 2>/dev/null || true)
            if [ "$ready" = "true" ]; then echo "status.ready=true"; exit 0; fi
            echo "waiting for status.ready ($i): got '$ready'"; sleep 2
          done
          kubectl -n default get instance/e2e -o yaml
          exit 1

      - name: assert operator finalizer is set
        run: |
          kubectl -n default get instance/e2e -o jsonpath='{.metadata.finalizers}' \
            | grep -q 'instances.n8n.slys.dev'

      - name: delete Instance and check cleanup event
        run: |
          kubectl -n default delete instance/e2e --wait=true --timeout=60s
          # the Instance object is gone — verify by listing
          if kubectl -n default get instance/e2e 2>/dev/null; then
            echo "instance still present after delete" >&2; exit 1
          fi

      - name: dump operator logs on failure
        if: failure()
        run: |
          kubectl -n n8n-operator logs deployment/n8n-rustful-operator --tail=200 || true
          kubectl get events -A --sort-by=.lastTimestamp | tail -50 || true
