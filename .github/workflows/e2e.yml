name: e2e

on:
  registry_package:
    types: [published, updated]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to test (e.g. v0.0.5)."
        required: true
        type: string

permissions:
  contents: read
  packages: read

env:
  IMAGE: ghcr.io/${{ github.repository }}
  TEST_INSTANCE_IMAGE: nginx:alpine

jobs:
  smoke:
    name: kind smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Skip registry_package events that aren't for our operator image
    # (e.g. cache packages, other artifacts).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.registry_package.package_type == 'container' &&
       github.event.registry_package.name == github.event.repository.name)
    steps:
      - name: resolve image tag
        id: tag
        env:
          MANUAL: ${{ github.event.inputs.tag }}
          PKG_VERSION_NAME: ${{ github.event.registry_package.package_version.container_metadata.tag.name }}
        run: |
          if [ -n "$MANUAL" ]; then
            tag="$MANUAL"
          elif [ -n "$PKG_VERSION_NAME" ] && [ "$PKG_VERSION_NAME" != "latest" ]; then
            tag="v$PKG_VERSION_NAME"
          else
            echo "no usable tag in event payload"; exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: pull ghcr image
        run: docker pull "${{ env.IMAGE }}:${{ steps.tag.outputs.version }}"

      - name: create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: n8n-e2e
          wait: 120s

      - name: load image into kind
        run: kind load docker-image "${{ env.IMAGE }}:${{ steps.tag.outputs.version }}" --name n8n-e2e

      - name: install CRD
        run: kubectl apply -f yaml/crd.yaml

      - name: install operator (pinned to tested tag, imagePullPolicy Never)
        run: |
          sed -e "s|__IMAGE_TAG__|${{ steps.tag.outputs.version }}|g" \
              -e "s|imagePullPolicy: IfNotPresent|imagePullPolicy: Never|g" \
              yaml/install.yaml | kubectl apply -f -
          kubectl -n n8n-operator rollout status deployment/n8n-rustful-operator --timeout=120s

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: run cucumber BDD suite
        run: cargo test --test cucumber --release -- --tags '~@skip'

      - name: dump operator logs on failure
        if: failure()
        run: |
          kubectl -n n8n-operator logs deployment/n8n-rustful-operator --tail=200 || true
          kubectl get events -A --sort-by=.lastTimestamp | tail -50 || true
