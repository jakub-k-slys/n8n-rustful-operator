name: e2e

on:
  registry_package:
    types: [published, updated]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to test (e.g. v0.0.5)."
        required: true
        type: string

permissions:
  contents: read
  packages: read

env:
  IMAGE: ghcr.io/${{ github.repository }}
  TEST_INSTANCE_IMAGE: nginx:alpine

jobs:
  smoke:
    name: kind smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Skip registry_package events that aren't for our operator image
    # (e.g. cache packages, other artifacts).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.registry_package.package_type == 'container' &&
       github.event.registry_package.name == github.event.repository.name)
    steps:
      - name: resolve image tag
        id: tag
        env:
          MANUAL: ${{ github.event.inputs.tag }}
          PKG_VERSION_NAME: ${{ github.event.registry_package.package_version.container_metadata.tag.name }}
        run: |
          if [ -n "$MANUAL" ]; then
            tag="$MANUAL"
          elif [ -n "$PKG_VERSION_NAME" ] && [ "$PKG_VERSION_NAME" != "latest" ]; then
            tag="v$PKG_VERSION_NAME"
          else
            echo "no usable tag in event payload"; exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: pull ghcr image
        run: docker pull "${{ env.IMAGE }}:${{ steps.tag.outputs.version }}"

      - name: create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: n8n-e2e
          wait: 120s

      - name: load image into kind
        run: kind load docker-image "${{ env.IMAGE }}:${{ steps.tag.outputs.version }}" --name n8n-e2e

      - name: install CRD
        run: kubectl apply -f yaml/crd.yaml

      - name: install operator (pinned to tested tag, imagePullPolicy Never)
        run: |
          sed -e "s|__IMAGE_TAG__|${{ steps.tag.outputs.version }}|g" \
              -e "s|imagePullPolicy: IfNotPresent|imagePullPolicy: Never|g" \
              yaml/install.yaml | kubectl apply -f -
          kubectl -n n8n-operator rollout status deployment/n8n-rustful-operator --timeout=120s

      - name: apply Instance
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: n8n.slys.dev/v1
          kind: Instance
          metadata:
            name: e2e
            namespace: default
          spec:
            image: ${{ env.TEST_INSTANCE_IMAGE }}
            replicas: 1
            host: e2e.example.com
          EOF

      - name: wait for child Deployment to be created
        run: |
          for i in {1..60}; do
            if kubectl -n default get deployment/e2e >/dev/null 2>&1; then break; fi
            echo "waiting for deployment/e2e ($i)…"; sleep 2
          done
          kubectl -n default get deployment/e2e -o yaml | head -40

      - name: assert child Service exists on port 5678
        run: |
          kubectl -n default get svc/e2e -o jsonpath='{.spec.ports[0].port}' | grep -q '^5678$'

      - name: assert Instance status was patched
        run: |
          for i in {1..15}; do
            ready=$(kubectl -n default get instance/e2e -o jsonpath='{.status.ready}' 2>/dev/null || true)
            if [ "$ready" = "true" ]; then echo "status.ready=true"; exit 0; fi
            echo "waiting for status.ready ($i): got '$ready'"; sleep 2
          done
          kubectl -n default get instance/e2e -o yaml
          exit 1

      - name: assert operator finalizer is set
        run: |
          kubectl -n default get instance/e2e -o jsonpath='{.metadata.finalizers}' \
            | grep -q 'instances.n8n.slys.dev'

      - name: delete Instance and check cleanup
        run: |
          kubectl -n default delete instance/e2e --wait=true --timeout=60s
          if kubectl -n default get instance/e2e 2>/dev/null; then
            echo "instance still present after delete" >&2; exit 1
          fi

      - name: dump operator logs on failure
        if: failure()
        run: |
          kubectl -n n8n-operator logs deployment/n8n-rustful-operator --tail=200 || true
          kubectl get events -A --sort-by=.lastTimestamp | tail -50 || true
