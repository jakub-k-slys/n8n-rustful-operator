apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: singles.n8n.slys.dev
spec:
  group: n8n.slys.dev
  names:
    categories: []
    kind: Single
    plural: singles
    shortNames:
    - n8n
    singular: single
  scope: Namespaced
  versions:
  - additionalPrinterColumns: []
    name: v1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for SingleSpec via `CustomResource`
        properties:
          spec:
            description: |-
              `Single` is a Kubernetes-native description of an n8n deployment.

              The reconciler creates a Deployment and Service for each instance and reports
              readiness back through the resource status.
            properties:
              database:
                description: Database backend configuration. Omit for n8n's sqlite default with no extra env vars.
                nullable: true
                properties:
                  mysql:
                    nullable: true
                    properties:
                      connectionTimeoutMs:
                        format: uint32
                        minimum: 0.0
                        nullable: true
                        type: integer
                      database:
                        type: string
                      host:
                        type: string
                      passwordSecret:
                        properties:
                          key:
                            default: encryption_key
                            description: Key within the Secret. Defaults to `encryption_key`.
                            type: string
                          name:
                            type: string
                        required:
                        - name
                        type: object
                      port:
                        format: int32
                        nullable: true
                        type: integer
                      ssl:
                        nullable: true
                        properties:
                          caSecret:
                            description: Mount as `/etc/n8n/ssl/ca/ca.crt` and pass via `DB_*_SSL_CA`.
                            nullable: true
                            properties:
                              key:
                                default: encryption_key
                                description: Key within the Secret. Defaults to `encryption_key`.
                                type: string
                              name:
                                type: string
                            required:
                            - name
                            type: object
                          certSecret:
                            nullable: true
                            properties:
                              key:
                                default: encryption_key
                                description: Key within the Secret. Defaults to `encryption_key`.
                                type: string
                              name:
                                type: string
                            required:
                            - name
                            type: object
                          enabled:
                            default: false
                            type: boolean
                          keySecret:
                            nullable: true
                            properties:
                              key:
                                default: encryption_key
                                description: Key within the Secret. Defaults to `encryption_key`.
                                type: string
                              name:
                                type: string
                            required:
                            - name
                            type: object
                          rejectUnauthorized:
                            nullable: true
                            type: boolean
                        type: object
                      user:
                        type: string
                    required:
                    - database
                    - host
                    - passwordSecret
                    - user
                    type: object
                  postgres:
                    nullable: true
                    properties:
                      connectionTimeoutMs:
                        format: uint32
                        minimum: 0.0
                        nullable: true
                        type: integer
                      database:
                        type: string
                      host:
                        type: string
                      passwordSecret:
                        properties:
                          key:
                            default: encryption_key
                            description: Key within the Secret. Defaults to `encryption_key`.
                            type: string
                          name:
                            type: string
                        required:
                        - name
                        type: object
                      poolSize:
                        format: uint32
                        minimum: 0.0
                        nullable: true
                        type: integer
                      port:
                        format: int32
                        nullable: true
                        type: integer
                      schema:
                        nullable: true
                        type: string
                      ssl:
                        nullable: true
                        properties:
                          caSecret:
                            description: Mount as `/etc/n8n/ssl/ca/ca.crt` and pass via `DB_*_SSL_CA`.
                            nullable: true
                            properties:
                              key:
                                default: encryption_key
                                description: Key within the Secret. Defaults to `encryption_key`.
                                type: string
                              name:
                                type: string
                            required:
                            - name
                            type: object
                          certSecret:
                            nullable: true
                            properties:
                              key:
                                default: encryption_key
                                description: Key within the Secret. Defaults to `encryption_key`.
                                type: string
                              name:
                                type: string
                            required:
                            - name
                            type: object
                          enabled:
                            default: false
                            type: boolean
                          keySecret:
                            nullable: true
                            properties:
                              key:
                                default: encryption_key
                                description: Key within the Secret. Defaults to `encryption_key`.
                                type: string
                              name:
                                type: string
                            required:
                            - name
                            type: object
                          rejectUnauthorized:
                            nullable: true
                            type: boolean
                        type: object
                      user:
                        type: string
                    required:
                    - database
                    - host
                    - passwordSecret
                    - user
                    type: object
                  sqlite:
                    nullable: true
                    properties:
                      database:
                        description: Path inside the pod, mapped to `DB_SQLITE_DATABASE`.
                        nullable: true
                        type: string
                      poolSize:
                        format: uint32
                        minimum: 0.0
                        nullable: true
                        type: integer
                      vacuumOnStartup:
                        nullable: true
                        type: boolean
                    type: object
                  type:
                    default: sqlite
                    description: '`sqlite` (default), `postgresdb`, `mysqldb` or `mariadb` — maps directly to `DB_TYPE`.'
                    type: string
                type: object
              encryptionKey:
                description: |-
                  N8N_ENCRYPTION_KEY source. If omitted, the operator generates a Secret
                  `<instance>-encryption-key` and owns it via ownerReference.
                nullable: true
                properties:
                  secretRef:
                    description: |-
                      Reference to an existing Secret. Mutually exclusive with auto-generation
                      (omit the whole `encryptionKey` block to auto-generate).
                    nullable: true
                    properties:
                      key:
                        default: encryption_key
                        description: Key within the Secret. Defaults to `encryption_key`.
                        type: string
                      name:
                        type: string
                    required:
                    - name
                    type: object
                type: object
              host:
                description: Externally-facing hostname. Required when `networking` is set.
                nullable: true
                type: string
              image:
                default: n8nio/n8n:latest
                description: Container image to deploy (e.g. `n8nio/n8n:1.70.0`).
                type: string
              networking:
                description: Expose n8n via an Ingress OR an HTTPRoute. The two are mutually exclusive.
                nullable: true
                properties:
                  httpRoute:
                    description: Provision a `gateway.networking.k8s.io/v1` HTTPRoute. Mutually exclusive with `ingress`.
                    nullable: true
                    properties:
                      gateway:
                        description: Gateway to attach this HTTPRoute to (parentRefs[0]).
                        properties:
                          name:
                            type: string
                          namespace:
                            nullable: true
                            type: string
                        required:
                        - name
                        type: object
                    required:
                    - gateway
                    type: object
                  ingress:
                    description: Provision a `networking.k8s.io/v1` Ingress. Mutually exclusive with `httpRoute`.
                    nullable: true
                    properties:
                      className:
                        nullable: true
                        type: string
                      tlsSecretName:
                        description: Name of a TLS Secret in the same namespace. If set, terminates TLS on the Ingress.
                        nullable: true
                        type: string
                    type: object
                type: object
              persistence:
                description: |-
                  Mount a PVC at `/home/node/.n8n` so the sqlite file, binary data and runtime
                  nodes survive pod restarts. Useful regardless of DB type.
                nullable: true
                properties:
                  accessMode:
                    default: ReadWriteOnce
                    type: string
                  size:
                    description: Storage request, e.g. `1Gi`.
                    type: string
                  storageClassName:
                    nullable: true
                    type: string
                required:
                - size
                type: object
              replicas:
                default: 1
                description: Number of replicas of the n8n pod.
                format: int32
                type: integer
              service:
                description: Service shape. Defaults to ClusterIP (sensible when networking handles ingress).
                nullable: true
                properties:
                  type:
                    default: ClusterIP
                    description: '`ClusterIP` (default), `NodePort`, or `LoadBalancer`.'
                    type: string
                type: object
            type: object
          status:
            nullable: true
            properties:
              encryptionKeySecret:
                description: Name of the Secret used as N8N_ENCRYPTION_KEY (managed or referenced).
                nullable: true
                type: string
              ready:
                type: boolean
              replicas:
                format: int32
                type: integer
              url:
                nullable: true
                type: string
            required:
            - ready
            - replicas
            type: object
        required:
        - spec
        title: Single
        type: object
    served: true
    storage: true
    subresources:
      status: {}
---
