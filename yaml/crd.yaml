apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: singles.n8n.slys.dev
spec:
  group: n8n.slys.dev
  names:
    categories: []
    kind: Single
    plural: singles
    shortNames:
    - n8n
    singular: single
  scope: Namespaced
  versions:
  - additionalPrinterColumns: []
    name: v1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for SingleSpec via `CustomResource`
        properties:
          spec:
            description: '`Single` is a Kubernetes-native description of a standalone n8n deployment.'
            properties:
              database:
                description: Database backend (sqlite default).
                nullable: true
                properties:
                  mysql:
                    nullable: true
                    properties:
                      connectionTimeoutMs:
                        format: uint32
                        minimum: 0.0
                        nullable: true
                        type: integer
                      database:
                        type: string
                      host:
                        type: string
                      passwordSecret:
                        properties:
                          key:
                            default: encryption_key
                            description: Key within the Secret. Defaults to `encryption_key`.
                            type: string
                          name:
                            type: string
                        required:
                        - name
                        type: object
                      port:
                        format: int32
                        nullable: true
                        type: integer
                      ssl:
                        nullable: true
                        properties:
                          caSecret:
                            nullable: true
                            properties:
                              key:
                                default: encryption_key
                                description: Key within the Secret. Defaults to `encryption_key`.
                                type: string
                              name:
                                type: string
                            required:
                            - name
                            type: object
                          certSecret:
                            nullable: true
                            properties:
                              key:
                                default: encryption_key
                                description: Key within the Secret. Defaults to `encryption_key`.
                                type: string
                              name:
                                type: string
                            required:
                            - name
                            type: object
                          enabled:
                            default: false
                            type: boolean
                          keySecret:
                            nullable: true
                            properties:
                              key:
                                default: encryption_key
                                description: Key within the Secret. Defaults to `encryption_key`.
                                type: string
                              name:
                                type: string
                            required:
                            - name
                            type: object
                          rejectUnauthorized:
                            nullable: true
                            type: boolean
                        type: object
                      user:
                        type: string
                    required:
                    - database
                    - host
                    - passwordSecret
                    - user
                    type: object
                  postgres:
                    nullable: true
                    properties:
                      connectionTimeoutMs:
                        format: uint32
                        minimum: 0.0
                        nullable: true
                        type: integer
                      database:
                        type: string
                      host:
                        type: string
                      passwordSecret:
                        properties:
                          key:
                            default: encryption_key
                            description: Key within the Secret. Defaults to `encryption_key`.
                            type: string
                          name:
                            type: string
                        required:
                        - name
                        type: object
                      poolSize:
                        format: uint32
                        minimum: 0.0
                        nullable: true
                        type: integer
                      port:
                        format: int32
                        nullable: true
                        type: integer
                      schema:
                        nullable: true
                        type: string
                      ssl:
                        nullable: true
                        properties:
                          caSecret:
                            nullable: true
                            properties:
                              key:
                                default: encryption_key
                                description: Key within the Secret. Defaults to `encryption_key`.
                                type: string
                              name:
                                type: string
                            required:
                            - name
                            type: object
                          certSecret:
                            nullable: true
                            properties:
                              key:
                                default: encryption_key
                                description: Key within the Secret. Defaults to `encryption_key`.
                                type: string
                              name:
                                type: string
                            required:
                            - name
                            type: object
                          enabled:
                            default: false
                            type: boolean
                          keySecret:
                            nullable: true
                            properties:
                              key:
                                default: encryption_key
                                description: Key within the Secret. Defaults to `encryption_key`.
                                type: string
                              name:
                                type: string
                            required:
                            - name
                            type: object
                          rejectUnauthorized:
                            nullable: true
                            type: boolean
                        type: object
                      user:
                        type: string
                    required:
                    - database
                    - host
                    - passwordSecret
                    - user
                    type: object
                  sqlite:
                    nullable: true
                    properties:
                      database:
                        description: Path inside the pod, mapped to `DB_SQLITE_DATABASE`.
                        nullable: true
                        type: string
                      poolSize:
                        format: uint32
                        minimum: 0.0
                        nullable: true
                        type: integer
                      vacuumOnStartup:
                        nullable: true
                        type: boolean
                    type: object
                  type:
                    default: sqlite
                    description: '`sqlite` (default), `postgresdb`, `mysqldb` or `mariadb` — maps to `DB_TYPE`.'
                    type: string
                type: object
              encryptionKey:
                description: N8N_ENCRYPTION_KEY source. Auto-generated if omitted.
                nullable: true
                properties:
                  secretRef:
                    description: Reference to an existing Secret. Omit the whole block to auto-generate.
                    nullable: true
                    properties:
                      key:
                        default: encryption_key
                        description: Key within the Secret. Defaults to `encryption_key`.
                        type: string
                      name:
                        type: string
                    required:
                    - name
                    type: object
                type: object
              extraEnv:
                description: Extra env passed straight to the n8n container.
                items:
                  description: |-
                    A user-supplied environment variable passed straight through to the n8n
                    container. Set exactly one of `value` (inline literal) or `valueFrom`
                    (pulled from a Secret). Operator-managed variables (encryption key, `DB_*`,
                    `QUEUE_BULL_*`, …) are rejected by validation so they can't be shadowed.
                  properties:
                    name:
                      type: string
                    value:
                      description: Inline literal value. Mutually exclusive with `valueFrom`.
                      nullable: true
                      type: string
                    valueFrom:
                      description: Pull the value from a Secret. Mutually exclusive with `value`.
                      nullable: true
                      properties:
                        secretRef:
                          properties:
                            key:
                              default: encryption_key
                              description: Key within the Secret. Defaults to `encryption_key`.
                              type: string
                            name:
                              type: string
                          required:
                          - name
                          type: object
                      required:
                      - secretRef
                      type: object
                  required:
                  - name
                  type: object
                type: array
              host:
                description: Externally-facing hostname. Required when `networking` is set.
                nullable: true
                type: string
              image:
                default: n8nio/n8n:latest
                description: Container image to deploy (e.g. `n8nio/n8n:1.70.0`).
                type: string
              imagePullSecrets:
                description: Names of Secrets used to pull the container image (private registries).
                items:
                  type: string
                type: array
              logging:
                description: Logging, diagnostics and metrics toggles.
                nullable: true
                properties:
                  diagnostics:
                    description: '`N8N_DIAGNOSTICS_ENABLED` — anonymous telemetry to n8n.'
                    nullable: true
                    type: boolean
                  level:
                    description: '`N8N_LOG_LEVEL`, e.g. `error`, `warn`, `info`, `debug`.'
                    nullable: true
                    type: string
                  metrics:
                    description: '`N8N_METRICS` — expose the Prometheus `/metrics` endpoint.'
                    nullable: true
                    type: boolean
                  output:
                    description: '`N8N_LOG_OUTPUT`, e.g. `console`, `file`, or `console,file`.'
                    nullable: true
                    type: string
                  versionNotifications:
                    description: '`N8N_VERSION_NOTIFICATIONS_ENABLED` — in-app update notices.'
                    nullable: true
                    type: boolean
                type: object
              networking:
                nullable: true
                properties:
                  httpRoute:
                    description: Provision a `gateway.networking.k8s.io/v1` HTTPRoute. Mutually exclusive with `ingress`.
                    nullable: true
                    properties:
                      gateway:
                        description: Gateway to attach this HTTPRoute to (parentRefs[0]).
                        properties:
                          name:
                            type: string
                          namespace:
                            nullable: true
                            type: string
                          sectionName:
                            description: |-
                              Gateway listener (`sectionName`) to attach to. Omit to let the Gateway
                              pick a compatible listener.
                            nullable: true
                            type: string
                        required:
                        - name
                        type: object
                      httpsRedirectSectionName:
                        description: |-
                          When set, also provision a companion HTTPRoute attached to this Gateway
                          listener (sectionName) that 301-redirects HTTP→HTTPS.
                        nullable: true
                        type: string
                    required:
                    - gateway
                    type: object
                  ingress:
                    description: Provision a `networking.k8s.io/v1` Ingress. Mutually exclusive with `httpRoute`.
                    nullable: true
                    properties:
                      className:
                        nullable: true
                        type: string
                      tlsSecretName:
                        description: Name of a TLS Secret in the same namespace.
                        nullable: true
                        type: string
                    type: object
                type: object
              persistence:
                description: PVC at `/home/node/.n8n` so binary data and the sqlite file persist.
                nullable: true
                properties:
                  accessMode:
                    default: ReadWriteOnce
                    type: string
                  size:
                    description: Storage request, e.g. `1Gi`.
                    type: string
                  storageClassName:
                    nullable: true
                    type: string
                required:
                - size
                type: object
              pod:
                description: Pod-level scheduling and metadata.
                nullable: true
                properties:
                  affinity:
                    description: Free-form pod affinity (k8s `Affinity`), passed through verbatim.
                    x-kubernetes-preserve-unknown-fields: true
                  nodeSelector:
                    additionalProperties:
                      type: string
                    nullable: true
                    type: object
                  podAnnotations:
                    additionalProperties:
                      type: string
                    description: Extra annotations merged onto the pod template metadata.
                    nullable: true
                    type: object
                  podLabels:
                    additionalProperties:
                      type: string
                    description: Extra labels merged onto the pod template metadata.
                    nullable: true
                    type: object
                  serviceAccountName:
                    description: |-
                      ServiceAccount the pods run as (also where image-pull Secrets attached
                      to the SA are honoured).
                    nullable: true
                    type: string
                  tolerations:
                    description: Free-form pod tolerations (k8s `[]Toleration`), passed through verbatim.
                    x-kubernetes-preserve-unknown-fields: true
                type: object
              replicas:
                default: 1
                format: int32
                type: integer
              resources:
                description: Container CPU/memory requests and limits.
                nullable: true
                properties:
                  limits:
                    nullable: true
                    properties:
                      cpu:
                        description: CPU quantity, e.g. `500m` or `1`.
                        nullable: true
                        type: string
                      memory:
                        description: Memory quantity, e.g. `512Mi` or `1Gi`.
                        nullable: true
                        type: string
                    type: object
                  requests:
                    nullable: true
                    properties:
                      cpu:
                        description: CPU quantity, e.g. `500m` or `1`.
                        nullable: true
                        type: string
                      memory:
                        description: Memory quantity, e.g. `512Mi` or `1Gi`.
                        nullable: true
                        type: string
                    type: object
                type: object
              secureCookie:
                description: |-
                  Sets `N8N_SECURE_COOKIE`. Omit for the n8n default (true). An `extraEnv`
                  entry of the same name overrides this.
                nullable: true
                type: boolean
              service:
                nullable: true
                properties:
                  type:
                    default: ClusterIP
                    description: '`ClusterIP` (default), `NodePort`, or `LoadBalancer`.'
                    type: string
                type: object
              smtp:
                description: SMTP notification settings (sets `N8N_EMAIL_MODE`/`N8N_SMTP_*`).
                nullable: true
                properties:
                  auth:
                    description: Credentials; omit for relays that accept unauthenticated mail.
                    nullable: true
                    properties:
                      passwordSecret:
                        description: '`N8N_SMTP_PASS`, sourced from a Secret.'
                        properties:
                          key:
                            default: encryption_key
                            description: Key within the Secret. Defaults to `encryption_key`.
                            type: string
                          name:
                            type: string
                        required:
                        - name
                        type: object
                      userSecret:
                        description: '`N8N_SMTP_USER`, sourced from a Secret.'
                        properties:
                          key:
                            default: encryption_key
                            description: Key within the Secret. Defaults to `encryption_key`.
                            type: string
                          name:
                            type: string
                        required:
                        - name
                        type: object
                    required:
                    - passwordSecret
                    - userSecret
                    type: object
                  host:
                    type: string
                  port:
                    format: uint16
                    maximum: 65535.0
                    minimum: 0.0
                    type: integer
                  sender:
                    description: '`N8N_SMTP_SENDER`, e.g. `n8n <no-reply@example.com>`.'
                    type: string
                  ssl:
                    description: '`N8N_SMTP_SSL` — implicit TLS (usually port 465).'
                    nullable: true
                    type: boolean
                  startTls:
                    description: '`N8N_SMTP_STARTTLS` — STARTTLS upgrade (usually port 587).'
                    nullable: true
                    type: boolean
                required:
                - host
                - port
                - sender
                type: object
            type: object
          status:
            nullable: true
            properties:
              encryptionKeySecret:
                nullable: true
                type: string
              ready:
                type: boolean
              replicas:
                format: int32
                type: integer
              url:
                nullable: true
                type: string
            required:
            - ready
            - replicas
            type: object
        required:
        - spec
        title: Single
        type: object
    served: true
    storage: true
    subresources:
      status: {}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clusters.n8n.slys.dev
spec:
  group: n8n.slys.dev
  names:
    categories: []
    kind: Cluster
    plural: clusters
    shortNames:
    - n8nc
    singular: cluster
  scope: Namespaced
  versions:
  - additionalPrinterColumns: []
    name: v1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for ClusterSpec via `CustomResource`
        properties:
          spec:
            properties:
              binaryData:
                description: |-
                  Binary-data storage shared across roles. Omit for n8n's per-pod
                  filesystem default (which does not share data between main and workers).
                nullable: true
                properties:
                  mode:
                    description: '`default` (in-memory), `database` (in the DB), `filesystem`, or `s3`.'
                    type: string
                  s3:
                    description: External S3-compatible storage; required when `mode` is `s3`.
                    nullable: true
                    properties:
                      accessKeySecret:
                        properties:
                          key:
                            default: encryption_key
                            description: Key within the Secret. Defaults to `encryption_key`.
                            type: string
                          name:
                            type: string
                        required:
                        - name
                        type: object
                      accessSecretSecret:
                        properties:
                          key:
                            default: encryption_key
                            description: Key within the Secret. Defaults to `encryption_key`.
                            type: string
                          name:
                            type: string
                        required:
                        - name
                        type: object
                      bucket:
                        type: string
                      bucketRegion:
                        type: string
                      host:
                        description: Endpoint host, e.g. `s3.eu-central-1.amazonaws.com` or a MinIO address.
                        type: string
                    required:
                    - accessKeySecret
                    - accessSecretSecret
                    - bucket
                    - bucketRegion
                    - host
                    type: object
                  sharedStorage:
                    description: |-
                      Shared `ReadWriteMany` volume for `mode: filesystem`, mounted on every
                      role at the binary-data path (`N8N_BINARY_DATA_STORAGE_PATH`) so files are
                      shared across roles in queue mode. Only valid with `mode: filesystem`.
                    nullable: true
                    properties:
                      accessMode:
                        default: ReadWriteMany
                        type: string
                      size:
                        description: Storage request, e.g. `5Gi`.
                        type: string
                      storageClassName:
                        nullable: true
                        type: string
                    required:
                    - size
                    type: object
                required:
                - mode
                type: object
              communityNodes:
                description: Community-node handling across roles (queue mode).
                nullable: true
                properties:
                  enabled:
                    description: '`N8N_COMMUNITY_PACKAGES_ENABLED`. Omit for the n8n default (true).'
                    nullable: true
                    type: boolean
                  packages:
                    description: |-
                      Declaratively managed package set. Sets `N8N_COMMUNITY_PACKAGES` and
                      `N8N_COMMUNITY_PACKAGES_MANAGED_BY_ENV=true`, so every role reconciles to
                      this exact list on startup and the UI install page becomes read-only.
                    items:
                      properties:
                        checksum:
                          nullable: true
                          type: string
                        name:
                          description: npm package name, e.g. `n8n-nodes-foo`.
                          type: string
                        version:
                          nullable: true
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                  reinstallMissing:
                    description: |-
                      `N8N_REINSTALL_MISSING_PACKAGES`. Legacy fallback (each pod reinstalls
                      missing packages from the DB on boot) — discouraged by the n8n docs as it
                      can slow startup, fail health checks, and double-load packages. Defaults
                      to off; prefer `packages` or `sharedStorage`.
                    nullable: true
                    type: boolean
                  sharedStorage:
                    description: |-
                      Shared `ReadWriteMany` volume mounted at `~/.n8n/nodes` on every role, so
                      a UI install propagates. Mutually exclusive with `packages`.
                    nullable: true
                    properties:
                      accessMode:
                        default: ReadWriteMany
                        type: string
                      size:
                        description: Storage request, e.g. `5Gi`.
                        type: string
                      storageClassName:
                        nullable: true
                        type: string
                    required:
                    - size
                    type: object
                type: object
              database:
                description: Queue mode requires a shared DB; sqlite is rejected.
                properties:
                  mysql:
                    nullable: true
                    properties:
                      connectionTimeoutMs:
                        format: uint32
                        minimum: 0.0
                        nullable: true
                        type: integer
                      database:
                        type: string
                      host:
                        type: string
                      passwordSecret:
                        properties:
                          key:
                            default: encryption_key
                            description: Key within the Secret. Defaults to `encryption_key`.
                            type: string
                          name:
                            type: string
                        required:
                        - name
                        type: object
                      port:
                        format: int32
                        nullable: true
                        type: integer
                      ssl:
                        nullable: true
                        properties:
                          caSecret:
                            nullable: true
                            properties:
                              key:
                                default: encryption_key
                                description: Key within the Secret. Defaults to `encryption_key`.
                                type: string
                              name:
                                type: string
                            required:
                            - name
                            type: object
                          certSecret:
                            nullable: true
                            properties:
                              key:
                                default: encryption_key
                                description: Key within the Secret. Defaults to `encryption_key`.
                                type: string
                              name:
                                type: string
                            required:
                            - name
                            type: object
                          enabled:
                            default: false
                            type: boolean
                          keySecret:
                            nullable: true
                            properties:
                              key:
                                default: encryption_key
                                description: Key within the Secret. Defaults to `encryption_key`.
                                type: string
                              name:
                                type: string
                            required:
                            - name
                            type: object
                          rejectUnauthorized:
                            nullable: true
                            type: boolean
                        type: object
                      user:
                        type: string
                    required:
                    - database
                    - host
                    - passwordSecret
                    - user
                    type: object
                  postgres:
                    nullable: true
                    properties:
                      connectionTimeoutMs:
                        format: uint32
                        minimum: 0.0
                        nullable: true
                        type: integer
                      database:
                        type: string
                      host:
                        type: string
                      passwordSecret:
                        properties:
                          key:
                            default: encryption_key
                            description: Key within the Secret. Defaults to `encryption_key`.
                            type: string
                          name:
                            type: string
                        required:
                        - name
                        type: object
                      poolSize:
                        format: uint32
                        minimum: 0.0
                        nullable: true
                        type: integer
                      port:
                        format: int32
                        nullable: true
                        type: integer
                      schema:
                        nullable: true
                        type: string
                      ssl:
                        nullable: true
                        properties:
                          caSecret:
                            nullable: true
                            properties:
                              key:
                                default: encryption_key
                                description: Key within the Secret. Defaults to `encryption_key`.
                                type: string
                              name:
                                type: string
                            required:
                            - name
                            type: object
                          certSecret:
                            nullable: true
                            properties:
                              key:
                                default: encryption_key
                                description: Key within the Secret. Defaults to `encryption_key`.
                                type: string
                              name:
                                type: string
                            required:
                            - name
                            type: object
                          enabled:
                            default: false
                            type: boolean
                          keySecret:
                            nullable: true
                            properties:
                              key:
                                default: encryption_key
                                description: Key within the Secret. Defaults to `encryption_key`.
                                type: string
                              name:
                                type: string
                            required:
                            - name
                            type: object
                          rejectUnauthorized:
                            nullable: true
                            type: boolean
                        type: object
                      user:
                        type: string
                    required:
                    - database
                    - host
                    - passwordSecret
                    - user
                    type: object
                  sqlite:
                    nullable: true
                    properties:
                      database:
                        description: Path inside the pod, mapped to `DB_SQLITE_DATABASE`.
                        nullable: true
                        type: string
                      poolSize:
                        format: uint32
                        minimum: 0.0
                        nullable: true
                        type: integer
                      vacuumOnStartup:
                        nullable: true
                        type: boolean
                    type: object
                  type:
                    default: sqlite
                    description: '`sqlite` (default), `postgresdb`, `mysqldb` or `mariadb` — maps to `DB_TYPE`.'
                    type: string
                type: object
              encryptionKey:
                nullable: true
                properties:
                  secretRef:
                    description: Reference to an existing Secret. Omit the whole block to auto-generate.
                    nullable: true
                    properties:
                      key:
                        default: encryption_key
                        description: Key within the Secret. Defaults to `encryption_key`.
                        type: string
                      name:
                        type: string
                    required:
                    - name
                    type: object
                type: object
              extraEnv:
                description: |-
                  Extra env applied to every role. A role's own `extraEnv` overrides an
                  entry here with the same name.
                items:
                  description: |-
                    A user-supplied environment variable passed straight through to the n8n
                    container. Set exactly one of `value` (inline literal) or `valueFrom`
                    (pulled from a Secret). Operator-managed variables (encryption key, `DB_*`,
                    `QUEUE_BULL_*`, …) are rejected by validation so they can't be shadowed.
                  properties:
                    name:
                      type: string
                    value:
                      description: Inline literal value. Mutually exclusive with `valueFrom`.
                      nullable: true
                      type: string
                    valueFrom:
                      description: Pull the value from a Secret. Mutually exclusive with `value`.
                      nullable: true
                      properties:
                        secretRef:
                          properties:
                            key:
                              default: encryption_key
                              description: Key within the Secret. Defaults to `encryption_key`.
                              type: string
                            name:
                              type: string
                          required:
                          - name
                          type: object
                      required:
                      - secretRef
                      type: object
                  required:
                  - name
                  type: object
                type: array
              image:
                default: n8nio/n8n:latest
                description: Cascading default image. Each role can override.
                type: string
              imagePullSecrets:
                description: |-
                  Names of Secrets used to pull the container image (private registries).
                  Applied to every role.
                items:
                  type: string
                type: array
              logging:
                description: Logging, diagnostics and metrics toggles, shared by every role.
                nullable: true
                properties:
                  diagnostics:
                    description: '`N8N_DIAGNOSTICS_ENABLED` — anonymous telemetry to n8n.'
                    nullable: true
                    type: boolean
                  level:
                    description: '`N8N_LOG_LEVEL`, e.g. `error`, `warn`, `info`, `debug`.'
                    nullable: true
                    type: string
                  metrics:
                    description: '`N8N_METRICS` — expose the Prometheus `/metrics` endpoint.'
                    nullable: true
                    type: boolean
                  output:
                    description: '`N8N_LOG_OUTPUT`, e.g. `console`, `file`, or `console,file`.'
                    nullable: true
                    type: string
                  versionNotifications:
                    description: '`N8N_VERSION_NOTIFICATIONS_ENABLED` — in-app update notices.'
                    nullable: true
                    type: boolean
                type: object
              main:
                default:
                  replicas: 0
                properties:
                  extraEnv:
                    description: Extra env for the main role; overrides `spec.extraEnv` by name.
                    items:
                      description: |-
