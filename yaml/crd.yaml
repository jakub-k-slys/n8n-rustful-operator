apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: instances.n8n.slys.dev
spec:
  group: n8n.slys.dev
  names:
    categories: []
    kind: Instance
    plural: instances
    shortNames:
    - n8n
    singular: instance
  scope: Namespaced
  versions:
  - additionalPrinterColumns: []
    name: v1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for InstanceSpec via `CustomResource`
        properties:
          spec:
            description: |-
              `Instance` is a Kubernetes-native description of an n8n deployment.

              The reconciler creates a Deployment and Service for each instance and reports
              readiness back through the resource status.
            properties:
              host:
                description: Optional externally-facing host. Surfaced in status for observability.
                nullable: true
                type: string
              image:
                default: n8nio/n8n:latest
                description: Container image to deploy (e.g. `n8nio/n8n:1.70.0`).
                type: string
              replicas:
                default: 1
                description: Number of replicas of the n8n pod.
                format: int32
                type: integer
            type: object
          status:
            nullable: true
            properties:
              ready:
                type: boolean
              replicas:
                format: int32
                type: integer
              url:
                nullable: true
                type: string
            required:
            - ready
            - replicas
            type: object
        required:
        - spec
        title: Instance
        type: object
    served: true
    storage: true
    subresources:
      status: {}
